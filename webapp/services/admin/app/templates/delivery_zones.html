<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Delivery Zones</title>
    <link rel="stylesheet" href="/static/css/users.css">
</head>
<body>
    <main class="admin-shell">
        <section class="admin-hero">
            <p class="eyebrow">Painel Administrativo</p>
            <h1>Delivery zones</h1>
            <p class="hero-copy">Acompanhe as zonas de entrega ativas e abra uma tela dedicada para atualizar cada uma delas.</p>
        </section>

        <nav class="admin-nav" aria-label="Menu administrativo">
            <a class="admin-nav__item" href="/admin/users">Usuarios</a>
            <a class="admin-nav__item" href="/admin/cardapio">Cardapio</a>
            <a class="admin-nav__item is-active" href="/admin/delivery-zones">Delivery Zones</a>
            <button id="logout-button" class="admin-nav__item admin-nav__button" type="button">Sair</button>
        </nav>

        <p id="page-message" class="page-message" aria-live="polite"></p>

        <section class="content-panel">
            <div class="panel-header">
                <div>
                    <div class="title-row">
                        <h2>Zonas de entrega</h2>
                        <button id="refresh-zones" class="title-icon-button" type="button" aria-label="Atualizar zonas de entrega">
                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M20 12a8 8 0 1 1-2.34-5.66"></path>
                                <path d="M20 4v6h-6"></path>
                            </svg>
                        </button>
                    </div>
                    <label class="search-field">
                        <div class="search-field__control">
                            <input id="zone-search" type="search" placeholder="Nome, cidade, estado ou bairro">
                            <button class="search-field__button" type="button" aria-label="Buscar zona de entrega">
                                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                    <circle cx="11" cy="11" r="6"></circle>
                                    <path d="M16 16L21 21"></path>
                                </svg>
                            </button>
                        </div>
                    </label>
                </div>
            </div>

            <div id="zones-loading" class="empty-state">Carregando delivery zones...</div>
            <div id="zones-empty" class="empty-state hidden">Nenhuma zona de entrega encontrada.</div>
            <div id="zones-list" class="users-grid" role="list"></div>
        </section>
    </main>

    <script src="/static/js/delivery_zones.js"></script>
</body>
</html>
