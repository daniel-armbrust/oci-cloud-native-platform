<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Cardapio</title>
    <link rel="stylesheet" href="/static/css/users.css">
</head>
<body>
    <main class="admin-shell">
        <section class="admin-hero">
            <p class="eyebrow">Painel Administrativo</p>
            <h1>Cardapio de pizzas</h1>
            <p class="hero-copy">Ajuste nome, slug, descricao, categoria, disponibilidade, imagem e precos do cardapio.</p>
        </section>

        <nav class="admin-nav" aria-label="Menu administrativo">
            <a class="admin-nav__item" href="/admin/users">Usuarios</a>
            <a class="admin-nav__item is-active" href="/admin/cardapio">Cardapio</a>
            <a class="admin-nav__item" href="/admin/delivery-zones">Delivery Zones</a>
            <button id="logout-button" class="admin-nav__item admin-nav__button" type="button">Sair</button>
        </nav>

        <p id="page-message" class="page-message" aria-live="polite"></p>

        <section class="content-panel">
            <div class="panel-header">
                <div>
                    <div class="title-row">
                        <h2>Pizzas cadastradas</h2>
                        <button id="refresh-pizzas" class="title-icon-button" type="button" aria-label="Atualizar pizzas">
                            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path d="M20 12a8 8 0 1 1-2.34-5.66"></path>
                                <path d="M20 4v6h-6"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="search-toolbar">
                        <button id="open-create-pizza" class="btn btn-primary" type="button">Nova pizza</button>
                        <label class="search-field">
                            <div class="search-field__control">
                                <input id="pizza-search" type="search" placeholder="Nome, slug, categoria ou descricao">
                                <button class="search-field__button" type="button" aria-label="Buscar pizza">
                                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                        <circle cx="11" cy="11" r="6"></circle>
                                        <path d="M16 16L21 21"></path>
                                    </svg>
                                </button>
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <div id="pizzas-loading" class="empty-state">Carregando cardapio...</div>
            <div id="pizzas-empty" class="empty-state hidden">Nenhuma pizza encontrada.</div>
            <div id="pizzas-list" class="users-grid" role="list"></div>
        </section>
    </main>

    <div id="create-pizza-modal" class="modal-overlay hidden" aria-hidden="true">
        <section class="modal-card" aria-labelledby="create-pizza-title">
            <div class="title-row">
                <h2 id="create-pizza-title">Nova pizza</h2>
                <button id="close-create-pizza" class="title-icon-button" type="button" aria-label="Fechar">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M6 6L18 18"></path>
                        <path d="M18 6L6 18"></path>
                    </svg>
                </button>
            </div>

            <form id="create-pizza-form" class="form-grid" novalidate>
                <label class="field">
                    <span>Nome</span>
                    <input id="create-pizza-name" type="text" maxlength="150" required>
                </label>

                <div class="split-grid">
                    <label class="field">
                        <span>Slug</span>
                        <input id="create-pizza-slug" type="text" maxlength="150" required>
                    </label>
                    <label class="field">
                        <span>Categoria</span>
                        <input id="create-pizza-category" type="text" maxlength="80" required>
                    </label>
                </div>

                <label class="field">
                    <span>Descricao</span>
                    <input id="create-pizza-description" type="text" maxlength="500" required>
                </label>

                <label class="field">
                    <span>Imagem</span>
                    <input id="create-pizza-image-url" type="text" maxlength="255" required>
                </label>

                <div class="field">
                    <span>Upload da imagem</span>
                    <div class="upload-row">
                        <input id="create-pizza-image-file" type="file" accept="image/*">
                        <button id="upload-create-pizza-image" class="btn btn-secondary" type="button">Enviar imagem</button>
                    </div>
                    <p id="create-pizza-image-upload-status" class="upload-status" aria-live="polite"></p>
                </div>

                <div class="split-grid">
                    <label class="field">
                        <span>Preco pequena</span>
                        <input id="create-pizza-price-small" type="number" step="0.01" min="0" required>
                    </label>
                    <label class="field">
                        <span>Preco media</span>
                        <input id="create-pizza-price-medium" type="number" step="0.01" min="0" required>
                    </label>
                </div>

                <div class="split-grid">
                    <label class="field">
                        <span>Preco grande</span>
                        <input id="create-pizza-price-large" type="number" step="0.01" min="0" required>
                    </label>
                    <label class="field">
                        <span>Status</span>
                        <select id="create-pizza-available">
                            <option value="true">Disponivel</option>
                            <option value="false">Indisponivel</option>
                        </select>
                    </label>
                </div>

                <div class="panel-actions">
                    <button id="submit-create-pizza" class="btn btn-primary" type="submit">Criar pizza</button>
                </div>
            </form>
        </section>
    </div>

    <script>
        window.ADMIN_CONFIG = {
            pizzaApiBaseUrl: {{ pizza_api_base_url | tojson }},
            pizzaImageBaseUrl: {{ pizza_image_base_url | tojson }}
        };
    </script>
    <script src="/static/js/menu.js"></script>
</body>
</html>
